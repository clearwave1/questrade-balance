# --- Datasource ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=camsim1123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/questrade

# No Flyway - Hibernate manages the schema
quarkus.hibernate-orm.database.generation=update
#quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# --- Questrade OAuth token endpoint (fixed host, never changes) ---
quarkus.rest-client.questrade-auth.url=https://login.questrade.com
quarkus.rest-client.questrade-auth.scope=jakarta.inject.Singleton

# --- HTTP ---
quarkus.http.port=8080
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH